---
layout: default
title: Blog
permalink: /blog/
---
<h1>Blog posts</h1>
<hr>
<ul>
    {% for category in site.categories %}
    <h2>{{ category[0] }}</h2>
        <hr>
        {% for post in category[1] %}
            <li class="blog-posts">
                <span class="tag">{{ post.tags[0] }}</span> <a href="{{ post.url }}"> {{ post.title }}</a> <p class="date">{{ post.tags[1] }}</p>
            </li>
        {% endfor %}
    {% endfor %}
</ul>
